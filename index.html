<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Glass Vertical Refraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        /* Centrado preciso para los inputs de color */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        /* Ocultar barra de desplazamiento en el contenedor si crece mucho */
        #mainController { max-height: 95vh; overflow-y: auto; scrollbar-width: none; }
        #mainController::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Controlador Vertical Izquierdo -->
    <div id="mainController" class="absolute left-6 top-1/2 -translate-y-1/2 z-10 flex flex-col items-stretch gap-4 p-6 w-72 bg-black/40 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl ui-element transition-opacity duration-300">
        
        <!-- Logotipo Zeqel Integrado -->
        <img id="mainLogo" src="https://raw.githubusercontent.com/eamxat/Imagenes-Zeqel/e78e9ea4a7f4681aebbd9e34c02e3079c4369129/Zeqel%20Texto%20negro.svg" alt="Zeqel Logo" class="h-8 invert drop-shadow-[0_0_8px_rgba(0,0,0,0.8)] self-center mb-1">

        <div class="flex flex-col gap-1.5">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Movimiento</label>
            <input type="range" id="speed" min="0.0" max="2" step="0.05" value="0.2" class="w-full accent-white h-1 bg-white/30 rounded-lg appearance-none cursor-pointer">
        </div>
        
        <div class="flex flex-col gap-1.5">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Refracción (Grosor)</label>
            <input type="range" id="intensity" min="0" max="3" step="0.1" value="1.5" class="w-full accent-white h-1 bg-white/30 rounded-lg appearance-none cursor-pointer">
        </div>

        <!-- NUEVO: Selector de Orientación -->
        <div class="flex flex-col gap-1.5">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Orientación</label>
            <select id="directionSelect" class="w-full bg-white/20 text-white text-[11px] rounded px-2 py-1.5 outline-none cursor-pointer border border-white/30">
                <option value="0" class="text-black">Vertical</option>
                <option value="90" class="text-black">Horizontal</option>
            </select>
        </div>

        <!-- NUEVO: Slider de Inclinación en Grados -->
        <div class="flex flex-col gap-1.5">
            <div class="flex justify-between items-center">
                <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Inclinación</label>
                <span id="angleValueDisplay" class="text-white/90 text-[11px] font-bold drop-shadow-md">0°</span>
            </div>
            <input type="range" id="angle" min="-90" max="90" step="1" value="0" class="w-full accent-white h-1 bg-white/30 rounded-lg appearance-none cursor-pointer">
        </div>
        
        <div class="flex items-center justify-between mt-1">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Tinte Luz</label>
            <input type="color" id="color1" value="#ffffff" class="w-7 h-5 rounded cursor-pointer border-0 p-0 bg-transparent">
        </div>
        
        <div class="flex items-center justify-between">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Tinte Sombra</label>
            <input type="color" id="color2" value="#000000" class="w-7 h-5 rounded cursor-pointer border-0 p-0 bg-transparent">
        </div>

        <div class="flex flex-col gap-1.5 mt-1">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Imagen</label>
            <select id="imageSelect" class="w-full bg-white/20 text-white text-[11px] rounded px-2 py-1.5 outline-none cursor-pointer border border-white/30">
                <option value="0" class="text-black">Retrato Floral</option>
                <option value="1" class="text-black">Ciudad Neón</option>
                <option value="2" class="text-black">Naturaleza</option>
                <option value="3" class="text-black">Abstracto 3D</option>
                <option value="local" class="text-black font-bold">Subir local...</option>
                <option value="url" class="text-black font-bold">Insertar URL...</option>
            </select>
        </div>

        <!-- Selector de Ajuste en Pantalla -->
        <div class="flex flex-col gap-1.5">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Ajuste en Pantalla</label>
            <select id="fitSelect" class="w-full bg-white/20 text-white text-[11px] rounded px-2 py-1.5 outline-none cursor-pointer border border-white/30">
                <option value="0" class="text-black">Cubrir Pantalla</option>
                <option value="1" class="text-black">Tamaño Original (Contener)</option>
            </select>
        </div>

        <!-- Selector de Calidad de Captura -->
        <div class="flex flex-col gap-1.5">
            <label class="text-white/90 text-[11px] font-bold uppercase tracking-widest drop-shadow-md">Calidad de Captura</label>
            <select id="captureResSelect" class="w-full bg-white/20 text-white text-[11px] rounded px-2 py-1.5 outline-none cursor-pointer border border-white/30">
                <option value="screen" class="text-black">Pantalla Actual</option>
                <option value="hd720" class="text-black">HD (1280x720)</option>
                <option value="hd" class="text-black">FHD (1920x1080)</option>
                <option value="2k" class="text-black">2K QHD (2560x1440)</option>
                <option value="4k" class="text-black">4K UHD (3840x2160)</option>
                <option value="8k" class="text-black">8K UHD (7680x4320)</option>
                <option value="square" class="text-black">Cuadrado (1080x1080)</option>
                <option value="vertical" class="text-black">Vertical (1080x1920)</option>
                <option value="original" class="text-black">Tamaño Original</option>
            </select>
        </div>

        <!-- Botón de Captura -->
        <button id="captureBtn" class="mt-2 w-full bg-white text-black px-4 py-3 rounded-lg text-[11px] font-bold uppercase tracking-widest hover:bg-gray-200 transition shadow-lg cursor-pointer">
            Capturar
        </button>

    </div>

    <!-- Modal para insertar URL (Oculto por defecto) -->
    <div id="urlModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-white/20 p-6 rounded-2xl shadow-2xl flex flex-col gap-4 w-96 font-sans">
            <h3 class="text-white font-bold text-lg">Ingresar URL de la imagen</h3>
            <input type="text" id="urlInput" placeholder="https://ejemplo.com/imagen.jpg" class="bg-black text-white p-3 rounded border border-white/30 outline-none focus:border-white/70 text-sm">
            <div class="flex justify-end gap-2 mt-2">
                <button id="cancelUrlBtn" class="text-white/70 hover:text-white px-4 py-2 text-sm font-bold transition">Cancelar</button>
                <button id="loadUrlBtn" class="bg-white text-black px-4 py-2 rounded text-sm font-bold hover:bg-gray-200 transition">Cargar Imagen</button>
            </div>
        </div>
    </div>

    <canvas id="glCanvas"></canvas>

    <!-- Shaders -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() {
            gl_Position = vec4(position, 0.0, 1.0);
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision highp float;
        
        uniform float time;
        uniform vec2 resolution;
        
        uniform float u_speed;
        uniform float u_intensity;
        uniform vec3 u_color1; // Tinte de luz
        uniform vec3 u_color2; // Tinte de sombra
        uniform float u_fitMode; // 0.0 para cubrir, 1.0 para contener
        uniform float u_angle; // NUEVO: Ángulo del cristal en grados
        
        // Variables para la textura
        uniform sampler2D u_image;
        uniform vec2 u_imageRes;
        uniform bool u_imageLoaded;

        // Función para simular el comportamiento de "background-size: cover"
        vec2 getCoverUv(vec2 uv, vec2 res, vec2 imgRes) {
            vec2 ratio = res / imgRes;
            float maxRatio = max(ratio.x, ratio.y);
            vec2 scaledImgRes = imgRes * maxRatio;
            vec2 offset = (scaledImgRes - res) / 2.0;
            return (uv * res + offset) / scaledImgRes;
        }

        // Función para simular el comportamiento de "background-size: contain"
        vec2 getContainUv(vec2 uv, vec2 res, vec2 imgRes) {
            vec2 ratio = res / imgRes;
            float minRatio = min(ratio.x, ratio.y);
            vec2 scaledImgRes = imgRes * minRatio;
            vec2 offset = (scaledImgRes - res) / 2.0;
            return (uv * res + offset) / scaledImgRes;
        }

        void main() {
            // UV normalizado de 0.0 a 1.0
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            
            // Cantidad de columnas de cristal
            float ribsCount = 45.0; 
            
            // NUEVO: Calculamos la dirección del vector basada en el ángulo
            float rad = radians(u_angle);
            vec2 dir = vec2(cos(rad), sin(rad));
            
            // Animamos proyectando el UV sobre nuestro vector de dirección
            float pan = dot(uv, dir) + (time * u_speed * 0.1);
            
            // Posición local dentro de la estría de cristal actual (0.0 a 1.0)
            float ribPos = fract(pan * ribsCount);
            
            // Convertimos la posición a un rango de -1.0 a 1.0 para simular la curva de un cilindro
            float xCurve = ribPos * 2.0 - 1.0;
            
            // Calculamos la pendiente/curvatura del cristal
            float slope = sin(xCurve * 1.5707); // 1.5707 = PI/2
            
            // Refracción: Desplazamos las coordenadas guiadas por el vector de dirección
            vec2 refractedUv = uv;
            refractedUv -= dir * slope * 0.015 * u_intensity;
            
            vec4 finalColor = vec4(0.0);
            
            if (u_imageLoaded) {
                vec4 texColor = vec4(0.0, 0.0, 0.0, 1.0); // Fondo negro
                
                if (u_fitMode > 0.5) {
                    // Modo "Tamaño Original" (Contener)
                    vec2 containUv = getContainUv(refractedUv, resolution, u_imageRes);
                    if (containUv.x >= 0.0 && containUv.x <= 1.0 && containUv.y >= 0.0 && containUv.y <= 1.0) {
                        texColor = texture2D(u_image, containUv);
                    }
                } else {
                    // Modo "Cubrir Pantalla"
                    vec2 coverUv = getCoverUv(refractedUv, resolution, u_imageRes);
                    texColor = texture2D(u_image, coverUv);
                }
                
                // Efectos 3D de Luz y Sombra para darle volumen a cada línea
                float highlight = pow(smoothstep(0.0, 0.4, -xCurve), 3.0) * 0.35 * u_intensity;
                float shadow = smoothstep(0.5, 1.0, xCurve) * 0.2 * u_intensity;
                
                // Color base
                vec3 rgb = texColor.rgb;
                
                // Aplicamos un ligero tinte cinematográfico (dependiendo del eje Y general)
                vec3 tint = mix(u_color1, u_color2, uv.y);
                rgb = mix(rgb, tint, 0.15); 
                
                // Sumamos brillos y restamos sombras
                rgb += highlight * u_color1;
                rgb -= shadow * (1.0 - u_color2); 
                
                finalColor = vec4(rgb, 1.0);
            } else {
                finalColor = vec4(0.1, 0.1, 0.1, 1.0);
            }

            gl_FragColor = finalColor;
        }
    </script>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vsSource = document.getElementById('vertex-shader').text;
        const fsSource = document.getElementById('fragment-shader').text;
        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
        
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        gl.useProgram(program);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const posAttrib = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(posAttrib);
        gl.vertexAttribPointer(posAttrib, 2, gl.FLOAT, false, 0, 0);

        // Ubicación de uniformes
        const timeLoc = gl.getUniformLocation(program, 'time');
        const resLoc = gl.getUniformLocation(program, 'resolution');
        const speedLoc = gl.getUniformLocation(program, 'u_speed');
        const intensityLoc = gl.getUniformLocation(program, 'u_intensity');
        const color1Loc = gl.getUniformLocation(program, 'u_color1');
        const color2Loc = gl.getUniformLocation(program, 'u_color2');
        const fitModeLoc = gl.getUniformLocation(program, 'u_fitMode');
        const angleLoc = gl.getUniformLocation(program, 'u_angle'); // Nuevo Uniforme de Ángulo
        
        const imageResLoc = gl.getUniformLocation(program, 'u_imageRes');
        const imageLoadedLoc = gl.getUniformLocation(program, 'u_imageLoaded');

        // Galería de imágenes
        const imageList = [
            'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=2574&auto=format&fit=crop',
            'https://images.unsplash.com/photo-1555448248-2571daf6344b?q=80&w=2000&auto=format&fit=crop',
            'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000&auto=format&fit=crop',
            'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop' 
        ];

        let currentImgW = 1920;
        let currentImgH = 1080;

        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));

        function loadTextureFromUrl(url) {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                currentImgW = img.width;
                currentImgH = img.height;
                
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                
                gl.useProgram(program);
                gl.uniform1i(imageLoadedLoc, 1);
                gl.uniform2f(imageResLoc, img.width, img.height);
            };
            img.onerror = () => {
                console.error("Error al cargar la imagen desde la URL. Verifica los permisos CORS o la ruta.");
            };
        }
        
        loadTextureFromUrl(imageList[0]);

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                loadTextureFromUrl(url);
            }
        };

        const urlModal = document.getElementById('urlModal');
        const urlInput = document.getElementById('urlInput');
        const cancelUrlBtn = document.getElementById('cancelUrlBtn');
        const loadUrlBtn = document.getElementById('loadUrlBtn');
        let lastValidSelection = "0";

        document.getElementById('imageSelect').addEventListener('change', (e) => {
            const val = e.target.value;
            if (val === 'local') {
                fileInput.click();
                e.target.value = lastValidSelection;
            } else if (val === 'url') {
                urlModal.classList.remove('hidden');
                e.target.value = lastValidSelection;
            } else {
                loadTextureFromUrl(imageList[parseInt(val)]);
                lastValidSelection = val;
            }
        });

        cancelUrlBtn.addEventListener('click', () => {
            urlModal.classList.add('hidden');
            urlInput.value = '';
        });

        loadUrlBtn.addEventListener('click', () => {
            if (urlInput.value.trim()) {
                loadTextureFromUrl(urlInput.value.trim());
                urlModal.classList.add('hidden');
                urlInput.value = '';
            }
        });

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16) / 255.0,
                parseInt(result[2], 16) / 255.0,
                parseInt(result[3], 16) / 255.0
            ] : [0,0,0];
        }

        // Elementos de la UI
        const speedCtrl = document.getElementById('speed');
        const intensityCtrl = document.getElementById('intensity');
        const color1Ctrl = document.getElementById('color1');
        const color2Ctrl = document.getElementById('color2');
        const fitSelect = document.getElementById('fitSelect');
        const directionSelect = document.getElementById('directionSelect');
        const angleCtrl = document.getElementById('angle');
        const angleValueDisplay = document.getElementById('angleValueDisplay');

        const uiElements = document.querySelectorAll('.ui-element');

        canvas.addEventListener('click', () => {
            uiElements.forEach(el => {
                el.classList.toggle('opacity-0');
                el.classList.toggle('pointer-events-none');
            });
        });

        const captureBtn = document.getElementById('captureBtn');
        const captureResSelect = document.getElementById('captureResSelect');

        captureBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            
            const resType = captureResSelect.value;
            let capW = canvas.width;
            let capH = canvas.height;
            
            if (resType === 'hd720') { capW = 1280; capH = 720; }
            else if (resType === 'hd') { capW = 1920; capH = 1080; }
            else if (resType === '2k') { capW = 2560; capH = 1440; }
            else if (resType === '4k') { capW = 3840; capH = 2160; }
            else if (resType === '8k') { capW = 7680; capH = 4320; }
            else if (resType === 'square') { capW = 1080; capH = 1080; }
            else if (resType === 'vertical') { capW = 1080; capH = 1920; }
            else if (resType === 'original') { capW = currentImgW; capH = currentImgH; }
            
            const oldW = canvas.width;
            const oldH = canvas.height;
            
            canvas.width = capW;
            canvas.height = capH;
            gl.viewport(0, 0, capW, capH);
            
            gl.useProgram(program);
            gl.uniform2f(resLoc, capW, capH);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            const dataURL = canvas.toDataURL("image/png");
            const link = document.createElement("a");
            link.download = `Refraction_Zeqel_${resType.toUpperCase()}.png`;
            link.href = dataURL;
            link.click();
            
            canvas.width = oldW;
            canvas.height = oldH;
            gl.viewport(0, 0, oldW, oldH);
        });

        // Actualizar visualizador de inclinación interactivo
        angleCtrl.addEventListener('input', (e) => {
            angleValueDisplay.innerText = e.target.value + '°';
        });

        function render(time) {
            time *= 0.001;
            
            const dpr = window.devicePixelRatio || 1;
            const targetWidth = Math.floor(window.innerWidth * dpr);
            const targetHeight = Math.floor(window.innerHeight * dpr);
            
            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }

            gl.useProgram(program);
            
            // Actualizar uniformes
            gl.uniform1f(timeLoc, time);
            gl.uniform2f(resLoc, canvas.width, canvas.height);
            gl.uniform1f(speedLoc, parseFloat(speedCtrl.value));
            gl.uniform1f(intensityLoc, parseFloat(intensityCtrl.value));
            gl.uniform1f(fitModeLoc, parseFloat(fitSelect.value)); 
            
            // Lógica de Ángulo (Suma Orientación + Inclinación Manual)
            let baseAngle = parseFloat(directionSelect.value);
            let extraAngle = parseFloat(angleCtrl.value);
            gl.uniform1f(angleLoc, baseAngle + extraAngle);
            
            let c1 = hexToRgb(color1Ctrl.value);
            let c2 = hexToRgb(color2Ctrl.value);
            gl.uniform3f(color1Loc, c1[0], c1[1], c1[2]);
            gl.uniform3f(color2Loc, c2[0], c2[1], c2[2]);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }

        window.onload = () => requestAnimationFrame(render);
    </script>
</body>
</html>
